name: JMI Lambda ECR deploy

# Cloud path for Docker/ECR when local Docker is unavailable (ubuntu runner has working Docker).
# Requires repo secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (IAM: ecr push + lambda update).
# AWS CloudShell does not support Docker — use this workflow or AWS CodeBuild (infra/aws/lambda/codebuild/buildspec.yml).

on:
  workflow_dispatch:
    inputs:
      image_tag_suffix:
        description: "Optional extra suffix for the ECR tag (appended after SHA)"
        required: false
        default: ""

env:
  AWS_REGION: ap-south-1
  ACCOUNT_ID: "470441577506"
  ECR_REPO: jmi-lambda
  BUCKET: jmi-dakshyadav-job-market-intelligence

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image, push, update Lambdas
        env:
          SUFFIX: ${{ github.event.inputs.image_tag_suffix }}
        run: |
          set -euo pipefail
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          TAG="v20-${GITHUB_SHA}"
          if [ -n "${SUFFIX:-}" ]; then TAG="${TAG}-${SUFFIX}"; fi
          IMAGE_URI="${REGISTRY}/${ECR_REPO}:${TAG}"
          docker build --platform linux/amd64 -f infra/aws/lambda/Dockerfile -t "${ECR_REPO}:${TAG}" .
          docker tag "${ECR_REPO}:${TAG}" "$IMAGE_URI"
          docker push "$IMAGE_URI"
          chmod +x infra/aws/lambda/update_lambdas_from_image_uri.sh
          export BUCKET_NAME="${BUCKET}"
          ./infra/aws/lambda/update_lambdas_from_image_uri.sh "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI"
